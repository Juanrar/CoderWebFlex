    <link rel="icon" href="../assets/hacker.png">
</head>
<body>
    <header class="header">
        <input type = "checkbox" class= "header__checkbox" id="open-menu">
        <label for="open-menu" class="header__open-nav-button" role="button">=</label>
            <div class="header__logo-container">
                <a href="../index.html"><img class="header__logo" src="../assets/hacker.png" alt="Go back / Go to the main menu"></a>
            </div>
        <nav class="header__nav">
            <ul class="header__nav-list">
                <li class="header__nav-item"><a href="../index.html#about">About</a></li>
                <li class="header__nav-item">
                    <input type="checkbox" id="open-projects">
                    <label for="open-projects">projects</label>
                    <ul>
                        <li><a href="dance.html">Dance Studio System</a></li>
                        <li><a href="feeder.html">Automatic Pet Feeder</a></li>

                    </ul>
                </li>
                <li class="header__nav-item"><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="contact" class="form py-5">
        <div class="container">
            <h1 class="form__title text-center mb-4">CONTACT</h1>

            <form class="form__form mx-auto" style="max-width: 600px;">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name"
                            placeholder="John" required>
                    </div>

                    <div class="col-md-6">
                        <label for="lastname" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastname" name="lastname"
                            placeholder="Doe" required>
                    </div>

                    <div class="col-12">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                            placeholder="yourmail@example.com" required>
                    </div>

                    <div class="col-12">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" name="message" rows="5"
                                placeholder="Your message" required></textarea>
                    </div>

                    <div class="col-12 text-center">
                        <button type="submit" class="btn btn-primary px-4">Send</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <footer>
        <strong>Juan Carlos Lorenzo</strong>- Copyright
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
        <script>
        AOS.init({
            duration: 700,   // ms que dura cada animación
            once: true,      // animar una sola vez (no cada vez que entra/sale)
            offset: 120,     // a qué distancia del viewport dispara
        });
        </script>
</body>
</html>
