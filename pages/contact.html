<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System </title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="header">
        <input type = "checkbox" class= "header__checkbox" id="open-menu">
        <label for="open-menu" class="header__open-nav-button" role="button">=</label>
            <div class="header__logo-container">
                <a href="../index.html"><img class="header__logo" src="../assets/hacker.png"></a>
            </div>
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-item">
                        <a href="../index.html">Back</a>
                    </li>
                </ul>
            </nav>
        </header>
    </body>
    <section id="contact" class="form">
        <h2 class="form__title">CONTACT</h2>
        <form class="form__form">
            <div class="form__input-container">
                <label>Nombre
                    <input type="text" placeholder="John">
                </label>
            </div>
            <div class="form__input-container">
                <label>Apellido
                    <input type="text" placeholder="Doe">
                </label>
            </div>
            <div class="form__input-container">
                <label>Email
                    <input type="text" placeholder="yourmail@example.com">
                </label>
            </div>
            <div class="form__input-container">
                <label>Mensaje
                    <textarea placeholder="Your message"></textarea>
                </label>
            </div>
            <div class="form__input-container">
                <input type="submit">
            </div>
        </form>
    </section>
</html>
